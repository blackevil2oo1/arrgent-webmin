      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Dashboard grid: 4 tiles -->
  <!-- Top-left tile (chart bar) -->
  <rect x="44" y="44" width="76" height="76" rx="12" fill="rgba(255,255,255,0.15)"/>
  <rect x="62" y="88" width="12" height="16" rx="3" fill="white"/>
  <rect x="80" y="74" width="12" height="30" rx="3" fill="white"/>
  <rect x="98" y="64" width="12" height="40" rx="3" fill="white"/>

  <!-- Top-right tile (signal/wifi arcs) -->
  <rect x="136" y="44" width="76" height="76" rx="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="174" cy="104" r="6" fill="white"/>
  <path d="M156 92 Q174 72 192 92" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <path d="M147 83 Q174 56 201 83" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="7" stroke-linecap="round"/>

  <!-- Bottom-left tile (list/lines) -->
  <rect x="44" y="136" width="76" height="76" rx="12" fill="rgba(255,255,255,0.15)"/>
  <rect x="62" y="158" width="40" height="8" rx="4" fill="white"/>
