  <circle cx="174" cy="174" r="12" fill="none" stroke="white" stroke-width="7"/>
  <circle cx="174" cy="174" r="5" fill="white"/>
  <rect x="171" y="152" width="6" height="10" rx="3" fill="white"/>
  <rect x="171" y="186" width="6" height="10" rx="3" fill="white"/>
  <rect x="152" y="171" width="10" height="6" rx="3" fill="white"/>
  <rect x="186" y="171" width="10" height="6" rx="3" fill="white"/>
