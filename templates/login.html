<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Seedbox Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0f1117; }</style>
</head>
<body class="h-full flex items-center justify-center text-gray-100">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Seedbox Admin</h1>
            <p class="text-gray-500 mt-1 text-sm">Enter your password to continue</p>
        </div>
        <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800 shadow-2xl">
            {% if error %}
            <div class="bg-red-900/30 border border-red-700 rounded-lg p-3 mb-4 text-red-300 text-sm">
                {{ error }}
            </div>
            {% endif %}
<form action="/login" method="post" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm text-gray-400 mb-1">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autofocus
                        required
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        placeholder="Enter password"
                    >
                </div>
                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg transition-colors"
                >
                    Login
                </button>
            </form>
        </div>
    </div>
</body>
</html>
