{% for n in notifications %}
{% set color = 'red' if n.importance == 'ALERT' else ('yellow' if n.importance == 'WARNING' else 'blue') %}
<div id="notif-{{ n.id }}" class="notification-item flex items-start gap-3 bg-{{ color }}-900/30 border border-{{ color }}-700/50 rounded-xl p-3">
    <svg class="w-4 h-4 text-{{ color }}-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <div class="min-w-0 flex-1">
        <p class="text-sm font-medium text-{{ color }}-300">{{ n.title }}</p>
        {% if n.description %}
        <p class="text-xs text-gray-400 mt-0.5 line-clamp-2">{{ n.description }}</p>
        {% endif %}
        {% if n.timestamp %}
        <p class="text-xs text-gray-600 mt-1">{{ n.timestamp }}</p>
        {% endif %}
    </div>
    <button onclick="dismissNotification('{{ n.id }}')" class="text-gray-500 hover:text-gray-300 shrink-0 p-0.5" title="Quittieren">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
</div>
{% endfor %}
