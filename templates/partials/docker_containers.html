{% if action_result is defined %}
<div class="mb-3 bg-green-900/30 border border-green-700 rounded-lg p-3 text-green-300 text-sm">
    {{ action_result.message }}
</div>
{% endif %}
<div class="space-y-2">
    {% for c in containers %}
    <div class="bg-gray-800 rounded-lg p-3 flex items-center gap-3">
        <div class="w-2.5 h-2.5 rounded-full shrink-0 {% if c.running %}bg-green-500{% else %}bg-red-500{% endif %}"></div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-200">{{ c.name }}</p>
            <p class="text-xs text-gray-500 truncate">{{ c.image }}</p>
        </div>
        <span class="text-xs px-2 py-0.5 rounded-full {% if c.running %}bg-green-900/50 text-green-400{% else %}bg-red-900/50 text-red-400{% endif %} shrink-0">
            {{ c.status }}
        </span>
        <div class="flex gap-1 shrink-0">
            {% if not c.running %}
            <form hx-post="/docker/action" hx-target="#containers-list" hx-swap="innerHTML">
                <input type="hidden" name="name" value="{{ c.name }}">
                <input type="hidden" name="action" value="start">
                <button type="submit" class="text-xs bg-green-800 hover:bg-green-700 text-white px-2 py-1 rounded">Start</button>
            </form>
            {% else %}
            <form hx-post="/docker/action" hx-target="#containers-list" hx-swap="innerHTML">
                <input type="hidden" name="name" value="{{ c.name }}">
                <input type="hidden" name="action" value="restart">
                <button type="submit" class="text-xs bg-yellow-800 hover:bg-yellow-700 text-white px-2 py-1 rounded">Restart</button>
            </form>
            <form hx-post="/docker/action" hx-target="#containers-list" hx-swap="innerHTML">
                <input type="hidden" name="name" value="{{ c.name }}">
                <input type="hidden" name="action" value="stop">
                <button type="submit" class="text-xs bg-red-900 hover:bg-red-800 text-white px-2 py-1 rounded">Stop</button>
            </form>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
