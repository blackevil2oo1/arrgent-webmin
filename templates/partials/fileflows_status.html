{% if ff_status %}
<div class="grid grid-cols-3 gap-3 text-center">
    <div>
        <div class="text-2xl font-bold text-orange-400">{{ ff_status.queue }}</div>
        <div class="text-xs text-gray-500 mt-1">Queue</div>
    </div>
    <div>
        <div class="text-2xl font-bold {% if ff_status.processing > 0 %}text-green-400{% else %}text-gray-400{% endif %}">{{ ff_status.processing }}</div>
        <div class="text-xs text-gray-500 mt-1">Processing</div>
    </div>
    <div>
        <div class="text-2xl font-bold text-blue-400">{{ ff_status.processed }}</div>
        <div class="text-xs text-gray-500 mt-1">Processed</div>
    </div>
</div>
{% if ff_status.processing_files %}
<div class="mt-3 space-y-1">
    {% for f in ff_status.processing_files %}
    <div class="text-xs text-gray-400 bg-gray-800 rounded px-3 py-1.5 truncate">
        {{ f.RelativeFile or f.relativeFile or f.Name or f.name or f }}
    </div>
    {% endfor %}
</div>
{% endif %}
{% endif %}
