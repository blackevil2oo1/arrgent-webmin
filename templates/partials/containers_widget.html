<div class="text-center py-2">
    <div class="text-3xl font-bold {% if running == total %}text-green-400{% else %}text-yellow-400{% endif %}">{{ running }}/{{ total }}</div>
    <div class="text-xs text-gray-500 mt-1">Running</div>
</div>
{% if running < total %}
<div class="mt-2 space-y-1">
    {% for c in containers %}{% if not c.running %}
    <div class="flex items-center gap-2 text-xs">
        <span class="w-2 h-2 rounded-full bg-red-500 shrink-0"></span>
        <span class="text-gray-400 truncate">{{ c.name }}</span>
    </div>
    {% endif %}{% endfor %}
</div>
{% endif %}
